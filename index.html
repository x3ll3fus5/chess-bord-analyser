<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu d'Échecs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>♟️ Jeu d'Échecs ♟️</h1>
        
        <div class="game-info">
            <div class="player-info">
                <span id="currentPlayer">Blanc à jouer</span>
            </div>
            <button id="resetBtn" class="btn-reset">Nouvelle partie</button>
        </div>

        <div class="board-container">
            <div id="chessboard" class="chessboard"></div>
        </div>

        <div class="moves-info">
            <h3>Derniers coups :</h3>
            <div id="movesList" class="moves-list"></div>
        </div>

        <div class="captures-info">
            <div class="captures">
                <h4>Pièces capturées (Blanc)</h4>
                <div id="whiteCaptures" class="captures-list"></div>
            </div>
            <div class="captures">
                <h4>Pièces capturées (Noir)</h4>
                <div id="blackCaptures" class="captures-list"></div>
            </div>
        </div>
    </div>

    <script src="chess.js"></script>
</body>
</html>
